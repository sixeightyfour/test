<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>3D Graph</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}
#graph {
  width: 100vw;
  height: 100vh;
}
</style>

<script src="https://unpkg.com/three"></script>
<script src="https://unpkg.com/3d-force-graph"></script>
</head>

<body>
<div id="graph"></div>

<script>

const Graph = ForceGraph3D()(document.getElementById('graph'));

fetch('graph_clean (1).json')
  .then(res => res.json())
  .then(data => {

    const nodes = data.nodes.map(n => ({
      id: n.id,
      x: (Math.random() - 0.5) * 8000,  // spread out more
      y: (Math.random() - 0.5) * 8000,
      z: (Math.random() - 0.5) * 8000
    }));

    const links = data.links;

    Graph.graphData({ nodes, links });

    // Pull camera back
    Graph.cameraPosition({ z: 12000 });

    // Physics settings
    Graph.d3Force('charge').strength(-900);
    Graph.d3Force('link').distance(250);
    Graph.d3Force('center', null);
    Graph.d3VelocityDecay(0.35);

    // Keep simulation running indefinitely
    Graph.cooldownTicks(Infinity);

    // ----------------------------
    // Save positions function
    // ----------------------------
    function savePositions(filename="node_positions.txt") {
      const positions = Graph.graphData().nodes.map(n =>
        `${n.id},${n.x},${n.y},${n.z}`
      ).join("\n");

      const blob = new Blob([positions], { type: "text/plain" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();

      URL.revokeObjectURL(url);
      console.log("Saved node positions:", filename);
    }

    // ----------------------------
    // Optional: backup every 5 minutes
    // ----------------------------
    setInterval(() => {
      savePositions("backup_positions.txt");
    }, 300000); // 5 minutes

    // ----------------------------
    // Final save after 30 minutes
    // ----------------------------
    setTimeout(() => {
      savePositions("final_positions.txt");
    }, 1800000); // 30 minutes

  });

</script>
</body>
</html>
